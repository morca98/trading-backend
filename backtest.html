<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Backtester — Crypto AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c12;--bg2:#0d1420;--bg3:#111927;--border:#1a2535;--border2:#243047;--text:#c8d8f0;--muted:#4a6080;--accent:#00d4ff;--green:#00e676;--red:#ff3d57;--yellow:#ffd600;--purple:#b388ff;--cyan:#00e5ff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;transition:background .3s,color .3s}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:12px}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 14px;border-bottom:1px solid var(--border2);margin-bottom:14px;flex-wrap:wrap;gap:8px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--muted);border-radius:2px;padding:6px 11px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;transition:all .2s}
.btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.primary{border-color:var(--accent);color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:2px;padding:12px;margin-bottom:10px}
.card-title{font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:3px;height:10px;background:var(--accent);flex-shrink:0}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:10px;text-align:center;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.c-green::after{background:var(--green)}.stat.c-red::after{background:var(--red)}.stat.c-yellow::after{background:var(--yellow)}.stat.c-purple::after{background:var(--purple)}.stat.c-cyan::after{background:var(--cyan)}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:2px}
.stat-lbl{font-size:8px;color:var(--muted);letter-spacing:2px}
.bt-trade-row{display:grid;grid-template-columns:60px 45px 70px 70px 70px;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:9px}
.bt-win{color:var(--green)}.bt-loss{color:var(--red)}
.asel{background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:2px;padding:6px 8px;font-family:'JetBrains Mono',monospace;font-size:11px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--accent);transition:width .3s}
.lvl-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
</style>
</head>
<body class="dark-bg">
<div class="wrap">
  <div class="header">
    <div class="logo">◈ BACKTESTER</div>
    <div style="display:flex;gap:8px">
      <select id="symSelect" class="asel">
        <option value="BTCUSDT">BTC/USDT</option>
        <option value="ETHUSDT">ETH/USDT</option>
      </select>
      <select id="tfSelect" class="asel">
        <option value="15m">15M</option>
        <option value="30m" selected>30M</option>
        <option value="1h">1H</option>
        <option value="4h">4H</option>
      </select>
      <button class="btn primary" id="btnRun" onclick="runBacktest()">▶ INICIAR</button>
    </div>
  </div>

  <div class="card" id="statusCard">
    <div class="card-title">ESTADO</div>
    <div id="statusText" style="font-size:10px;color:var(--muted)">Pronto para iniciar backtest de 90 dias com risco de 1% por trade.</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="g4" id="statsGrid" style="display:none">
    <div class="stat c-cyan"><div class="stat-val" id="statReturn">--</div><div class="stat-lbl">RETORNO</div></div>
    <div class="stat c-green"><div class="stat-val" id="statWinRate">--</div><div class="stat-lbl">WIN RATE</div></div>
    <div class="stat c-yellow"><div class="stat-val" id="statTrades">--</div><div class="stat-lbl">TRADES</div></div>
    <div class="stat c-purple"><div class="stat-val" id="statCapital">--</div><div class="stat-lbl">CAPITAL</div></div>
  </div>

  <div class="g3" id="statsGrid2" style="display:none">
    <div class="stat c-green"><div class="stat-val" id="statAvgWin">--</div><div class="stat-lbl">MÉDIA WIN</div></div>
    <div class="stat c-red"><div class="stat-val" id="statAvgLoss">--</div><div class="stat-lbl">MÉDIA LOSS</div></div>
    <div class="stat c-yellow"><div class="stat-val" id="statMaxDD">--</div><div class="stat-lbl">MAX DD</div></div>
  </div>

  <div class="card" id="equityCard" style="display:none">
    <div class="card-title">CURVA DE CAPITAL</div>
    <div id="equityChart"></div>
  </div>

  <div class="card" id="tradesCard" style="display:none">
    <div class="card-title">HISTÓRICO DE TRADES</div>
    <div class="bt-trade-row" style="color:var(--muted);font-size:8px;letter-spacing:1px">
      <span>DATA</span><span>SINAL</span><span>ENTRADA</span><span>SAÍDA</span><span>P&L</span>
    </div>
    <div id="tradesList" style="max-height:400px;overflow-y:auto"></div>
  </div>
</div>

<script>
const BACKEND = window.location.origin;
const CAPITAL_INICIAL = 1000;

function setStatus(txt, pct) {
  document.getElementById("statusText").textContent = txt;
  document.getElementById("progressFill").style.width = pct + "%";
}

function renderResults(trades, finalCap, maxDD, sym, profitFactor) {
  const ret = ((finalCap - CAPITAL_INICIAL) / CAPITAL_INICIAL * 100).toFixed(1);
  const wins = trades.filter(t => t.result === "WIN");
  const wr = trades.length ? (wins.length / trades.length * 100).toFixed(0) : 0;
  
  document.getElementById("statReturn").textContent = (ret >= 0 ? "+" : "") + ret + "%";
  document.getElementById("statWinRate").textContent = wr + "%";
  document.getElementById("statTrades").textContent = trades.length;
  document.getElementById("statCapital").textContent = "$" + Math.round(finalCap);
  
  const avgWin = wins.length ? wins.reduce((s, t) => s + t.pnl, 0) / wins.length : 0;
  const losses = trades.filter(t => t.result === "LOSS");
  const avgLoss = losses.length ? losses.reduce((s, t) => s + t.pnl, 0) / losses.length : 0;
  
  document.getElementById("statAvgWin").textContent = "+$" + avgWin.toFixed(1);
  document.getElementById("statAvgLoss").textContent = "$" + avgLoss.toFixed(1);
  document.getElementById("statMaxDD").textContent = maxDD.toFixed(1) + "%";

  const equityData = [CAPITAL_INICIAL, ...trades.map(t => t.capital)];
  renderEquityChart(equityData);

  document.getElementById("tradesList").innerHTML = trades.slice().reverse().map(t => `
    <div class="bt-trade-row ${t.result === 'WIN' ? 'bt-win' : 'bt-loss'}">
      <span style="color:var(--muted)">${t.date}</span>
      <span style="color:${t.signal === 'BUY' ? 'var(--green)' : 'var(--red)'}">${t.signal}</span>
      <span>$${Math.round(t.entry)}</span>
      <span>$${Math.round(t.exit)}</span>
      <span>${t.pnl >= 0 ? '+' : ''}${t.pnl.toFixed(1)}%</span>
    </div>`).join("");

  document.getElementById("statsGrid").style.display = "grid";
  document.getElementById("statsGrid2").style.display = "grid";
  document.getElementById("equityCard").style.display = "block";
  document.getElementById("tradesCard").style.display = "block";
}

function renderEquityChart(data) {
  const W = 460, H = 100, P = 8;
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const cw = (W - P * 2) / (data.length - 1 || 1);
  const py = v => P + (H - P * 2) - ((v - min) / range) * (H - P * 2);
  let path = `M ${P} ${py(data[0])}`;
  data.forEach((v, i) => { if (i > 0) path += ` L ${P + i * cw} ${py(v)}`; });
  const col = data[data.length - 1] >= CAPITAL_INICIAL ? "var(--green)" : "var(--red)";
  document.getElementById("equityChart").innerHTML = `
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
      <line x1="${P}" x2="${W-P}" y1="${py(CAPITAL_INICIAL)}" y2="${py(CAPITAL_INICIAL)}" stroke="var(--border2)" stroke-width="1" stroke-dasharray="4 4"/>
      <path d="${path} L ${P + (data.length-1)*cw} ${H-P} L ${P} ${H-P} Z" fill="${col}" opacity="0.15"/>
      <path d="${path}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="${W-P}" y="${py(data[data.length-1])-4}" text-anchor="end" fill="${col}" font-size="8" font-family="monospace">$${Math.round(data[data.length-1])}</text>
    </svg>`;
}

async function runBacktest() {
  const sym = document.getElementById("symSelect").value;
  const tf = document.getElementById("tfSelect").value;
  const btn = document.getElementById("btnRun");
  btn.disabled = true;
  btn.textContent = "A PROCESSAR...";
  
  try {
    setStatus("A carregar dados da Binance...", 30);
    const r = await fetch(`${BACKEND}/api/backtest?symbol=${sym}&interval=${tf}&days=90`);
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    
    setStatus("Backtest concluído!", 100);
    const trades = d.trades.map(t => ({
      date: new Date(t.time).toISOString().slice(5,16).replace('T',' '),
      signal: t.signal,
      entry: t.entry,
      exit: t.exit,
      pnl: (t.pnl / (t.capital - t.pnl)) * 100,
      result: t.outcome,
      capital: t.capital
    }));
    renderResults(trades, parseFloat(d.finalCapital), parseFloat(d.maxDD), sym, d.profitFactor);
  } catch (e) {
    setStatus("Erro: " + e.message, 0);
  }
  btn.disabled = false;
  btn.textContent = "▶ INICIAR";
}
</script>
</body>
</html>
